<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zh-info&sécurite</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #FFA07A, #FF69B4);
        }

        header {
            background-color: #FF6347;
            color: #fff;
            text-align: center;
            padding: 1em;
            width: 100%;
        }
        
        .navbar {
            width: 100%;
            background-color: #555;
            overflow: auto;
        }

        .navbar a {
            float: right;
            text-align: center;
            padding: 12px;
            color: white;
            text-decoration: none;
            font-size: 17px;
        }

        .navbar a:hover {
            background-color: #000;
        }

        .active {
            background-color: #04AA6D;
        }

        #circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: #4E709D;
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
            100% {
                transform: scale(1);
            }
        }

        #form-container {
            background-color: #fff;
            border-radius: 30px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            width: 400px;
            margin-top: 20px;
            text-align: center;
        }

        form {
            padding: 20px;
            text-align: center;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            background-color: #FF6347;
            color: #fff;
            padding: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #FF4500;
        }

        #success-message {
            color: black;
            margin-top: 16px;
            display: none;
        }
    </style>
</head>
<body>
    <header>
        <h1>Passe un Commande</h1>
    </header>
    <div id="circle">
        <div id="circle-text">Zra-Teck</div>
    </div>
    <div class="navbar">
        <a class="active" href="#"><i class="fa fa-fw fa-home"></i> Commande</a>
        <a href="contact2.html"><i class="fa fa-fw fa-envelope"></i> Contact</a>
        <a href="home.html"><i class="fa fa-fw fa-home"></i> Home</a>
        <a href="abut2.html">About</a>
    </div>
    <div id="form-container">
        <form id="contact-form" action ="commande.php" method="POST"
		onsubmit="return submitForm()">
            <label for="name">Nom :</label>
            <input type="text" id="name" name="name" required>

            <label for="phone">Numéro de téléphone :</label>
            <input type="text" id="phone" name="phone" required>

            <label for="address">Adresse :</label>
            <input type="text" id="address" name="address" required>

            <label for="productRef">Référence de produit :</label>
            <input type="text" id="productRef" name="productRef" required>

            <label for="quantity">Quantité Apple :</label>
            <input type="number" id="quantity" name="quantity" min="1" value="1" required>

            <button type="submit">Valider</button>
            <button type="button" onclick="alert('Commande annulée')">Annuler</button>

            <div id="success-message">Commande passée avec succès!</div>
        </form>
    </div>

    <script>
        function submitForm() {
            const name = document.getElementById('name').value.trim();
            const address = document.getElementById('address').value.trim();
            const quantity = document.getElementById('quantity').value;

            if (name === '' || address === '' || quantity < 1) {
                alert('Tous les champs doivent être remplis correctement.');
                return false;
            }

            document.getElementById('success-message').style.display = 'block';
            alert('Commande passée avec succès!');
            return false; // Empêcher l'envoi réel du formulaire pour démo
        }
    </script>
</body>
</html>
