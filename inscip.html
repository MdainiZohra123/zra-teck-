<!DOCTYPE html>
<html lang="en">
<head>
    <title>ZH-info && sécurité</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #683030;
            color: black;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: #4E709D;
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
            100% {
                transform: scale(1);
            }
        }

        .header {
            width: 100%;
            background-color: black;
            overflow: auto;
            color: white;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .header a {
            float: right;
            text-align: center;
            padding: 12px;
            color: white;
            text-decoration: none;
            font-size: 17px;
        }

        .header a:hover {
            background-color: #000;
        }

        .active {
            background-color: #04AA6D;
        }

        .form-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
            border-radius: 10px;
            background-color: #E0819A;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 300px;
        }

        input {
            margin-bottom: 10px;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px;
            cursor: pointer;
            background-color: #683030;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #365B7E;
        }
    </style>

    <script>
        function validateForm() {
            var name = document.getElementById('name').value;

            if (name === "") {
                alert("Veuillez saisir votre nom.");
            } else {
                var confirmation = confirm("Bonjour " + name + ", votre inscription est réussie. Cliquez sur OK pour être redirigé vers la page d'accueil.");
                if (confirmation) {
                    window.location.href = "home.html";
                }
            }
        }
    </script>
</head>
<body>
    <div id="circle">
        <div id="circle-text">Zra-Tech</div>
    </div>
    <div class="header">
        <a class="active" href="#">Sign Up</a>
        <a href="contact2.html">Contact</a>
        <a href="abut2.html">About</a>
		<a href="vente.html">Home</a>
    </div>
    <div class="form-container"action="inscription.php"method="post">
        <label for="name">Nom:</label>
        <input type="text" id="name" name="name">

        <label for="gmail">Gmail:</label>
        <input type="email" id="gmail" name="gmail" >

        <label for="password">Mot de passe:</label>
        <input type="password" id="password" name="password">

        <label for="confirm-password">Confirmer le mot de passe:</label>
        <input type="password" id="confirm-password" name="confirm-password" >

        <label for="birthdate">Date de naissance:</label>
        <input type="date" id="birthdate" name="birthdate">

        <button onclick="validateForm()">Valider</button>
		<br><br>
        <button onclick="alert('Inscription annulée')">Annuler</button>
    </div>
</body>
</html>
